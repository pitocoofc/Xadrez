<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostOS - Kasparov Engine</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        h2 {
            color: #3b82f6;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            height: 18px;
        }

        /* Grid do Tabuleiro de Xadrez Responsivo */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw;
            max-width: 360px;
            height: 90vw;
            max-height: 360px;
            border: 4px solid #222;
            box-sizing: border-box;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7vw; /* Escala dinamicamente em telas mobile */
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
            box-sizing: border-box;
        }

        @media (min-width: 400px) {
            .square {
                font-size: 32px; /* Limita o tamanho máximo no PC */
            }
        }

        /* Cores do Tabuleiro (Estética Dark/Terminal) */
        .light { background-color: #2a2a2a; }
        .dark { background-color: #141414; }

        /* Estados de Seleção e Destaque */
        .square.selected { background-color: #1d4ed8 !important; }
        .square.last-move { background-color: #0d301c !important; }

        /* Console de Logs Psicológicos (Trash Talk) */
        #console {
            width: 90vw;
            max-width: 360px;
            height: 90px;
            background: #000;
            border: 1px solid #222;
            margin-top: 15px;
            padding: 8px;
            font-size: 11px;
            line-height: 1.4;
            color: #0f0;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .btn-reset {
            margin-top: 15px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.2s;
        }
        .btn-reset:hover { background: #222; border-color: #3b82f6; }
    </style>
</head>
<body>

    <h2>GARRY_KASPAROV_AI</h2>
    <div class="status" id="game-status">Injetando Kernel do Motor...</div>

    <div id="board"></div>

    <div id="console">> [System]: Contornando bloqueio de segurança CORS via Blob...</div>

    <button class="btn-reset" onclick="reiniciarJogo()">[ RESETAR PARTIDA ]</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('game-status');
        const consoleEl = document.getElementById('console');

        let game = new Chess();
        let selectedSquare = null;
        let stockfish = null;
        let enginePronta = false;

        // Dicionário de Peças Unicode
        const PIECES_UNICODE = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', // Pretas (Kasparov)
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'  // Brancas (Você)
        };

        // Frases de pressão tática do Kasparov
        const KASPAROV_QUOTES = [
            "O xadrez é uma agonia mental. Você está pronto para sofrer?",
            "Seu plano é fraco. Consigo ver sua derrota a 10 lances de distância.",
            "Você joga com medo. O tabuleiro pune a hesitação.",
            "A imprecisão é o primeiro passo para o colapso estrutural.",
            "Ataque é a única forma de xadrez que eu respeito."
        ];

        /* --- INICIALIZAÇÃO DO MOTOR COM CONTORNO DE CORS --- */
        async function initEngine() {
            try {
                const cdnUrl = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
                
                // Baixa o script da CDN como texto puro
                const response = await fetch(cdnUrl);
                if (!response.ok) throw new Error("Erro ao baixar script da CDN");
                const workerCode = await response.text();
                
                // Transforma o texto em um Blob executável de origem local
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                const blobURL = URL.createObjectURL(blob);
                
                // Instancia o Worker sem violar as regras de CORS do navegador
                stockfish = new Worker(blobURL);
                
                stockfish.postMessage('uci');
                stockfish.postMessage('isready');

                stockfish.onmessage = function(event) {
                    const msg = event.data;
                    
                    if (msg === 'readyok') {
                        enginePronta = true;
                        // Força estilo agressivo do Kasparov (Contempt alto)
                        stockfish.postMessage('setoption name Contempt value 120');
                        stockfish.postMessage('setoption name Skill Level value 20'); 
                        printLog("Garry Kasparov carregado com sucesso. Faça seu lance (Brancas).");
                        updateStatus();
                    }

                    // Trata o lance calculado pela IA
                    if (msg.startsWith('bestmove')) {
                        const move = msg.split(' ')[1];
                        if (move && move !== '(none)') {
                            executarLanceKasparov(move);
                        }
                    }
                };
            } catch(e) {
                console.error(e);
                printLog("Falha crítica de segurança ou rede ao injetar o Kernel.");
                statusEl.innerText = "Erro de Barramento.";
            }
        }

        /* --- RENDERIZADOR DO TABULEIRO --- */
        function drawBoard() {
            boardEl.innerHTML = '';
            const boardState = game.board();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const squareEl = document.createElement('div');
                    const isLight = (r + c) % 2 === 0;
                    const squareCoord = String.fromCharCode(97 + c) + (8 - r);

                    squareEl.classList.add('square', isLight ? 'light' : 'dark');
                    squareEl.dataset.coord = squareCoord;

                    const piece = boardState[r][c];
                    if (piece) {
                        const pieceKey = piece.color === 'w' ? piece.type.toUpperCase() : piece.type.toLowerCase();
                        squareEl.innerText = PIECES_UNICODE[pieceKey] || '';
                        squareEl.style.color = piece.color === 'w' ? '#fff' : '#ff5555'; // Vermelho pro oponente
                    }

                    squareEl.onclick = () => handleSquareClick(squareCoord);
                    boardEl.appendChild(squareEl);
                }
            }
        }

        /* --- CONTROLE DE CLIQUE E JOGADAS --- */
        function handleSquareClick(coord) {
            if (game.turn() !== 'w' || game.game_over() || !enginePronta) return;

            if (selectedSquare === coord) {
                selectedSquare = null;
                drawBoard();
                return;
            }

            if (selectedSquare) {
                const move = game.move({
                    from: selectedSquare,
                    to: coord,
                    promotion: 'q' // Promoção automática para Rainha
                });

                if (move) {
                    selectedSquare = null;
                    drawBoard();
                    highlightLastMove(move.from, move.to);
                    updateStatus();

                    if (!game.game_over()) {
                        statusEl.innerText = "Kasparov está calculando a sua ruína...";
                        setTimeout(dispararEnginePretas, 300);
                    }
                } else {
                    // Seleção alternativa se clicar em outra peça sua
                    const piece = game.get(coord);
                    if (piece && piece.color === 'w') {
                        selectedSquare = coord;
                        drawBoard();
                        document.querySelector(`[data-coord="${coord}"]`).classList.add('selected');
                    }
                }
            } else {
                const piece = game.get(coord);
                if (piece && piece.color === 'w') {
                    selectedSquare = coord;
                    document.querySelector(`[data-coord="${coord}"]`).classList.add('selected');
                }
            }
        }

        /* --- FLUXO DO BOT --- */
        function dispararEnginePretas() {
            if (!enginePronta) return;
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go movetime 800'); // Tempo de resposta fixo em 800ms
        }

        function ejecutarLanceKasparov(moveStr) {
            const from = moveStr.substring(0, 2);
            const to = moveStr.substring(2, 4);

            const move = game.move({ from: from, to: to, promotion: 'q' });
            if (move) {
                drawBoard();
                highlightLastMove(from, to);
                updateStatus();
                
                if (Math.random() > 0.4) {
                    const frase = KASPAROV_QUOTES[Math.floor(Math.random() * KASPAROV_QUOTES.length)];
                    printLog(`Kasparov: "${frase}"`);
                }
            }
        }

        /* --- FEEDBACKS VISUAIS --- */
        function highlightLastMove(from, to) {
            document.querySelector(`[data-coord="${from}"]`)?.classList.add('last-move');
            document.querySelector(`[data-coord="${to}"]`)?.classList.add('last-move');
        }

        function printLog(text) {
            consoleEl.innerHTML += `<br>> ${text}`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function updateStatus() {
            if (!enginePronta) return;

            let statusText = "Sua vez (Brancas).";
            
            if (game.in_checkmate()) {
                statusText = "XEQUE-MATE! Fim de jogo.";
                printLog(game.turn() === 'w' ? "System: Garry Kasparov venceu por destruição tática." : "System: Você venceu Kasparov! Um feito inacreditável.");
            } else if (game.in_draw() || game.in_stalemate()) {
                statusText = "Partida empatada.";
                printLog("System: Empate por falta de material ou afogamento.");
            } else if (game.in_check()) {
                statusText = "Atenção: Seu Rei está em Xeque!";
            }

            statusEl.innerText = statusText;
        }

        function reiniciarJogo() {
            game = new Chess();
            selectedSquare = null;
            drawBoard();
            updateStatus();
            printLog("Partida reiniciada. Tabuleiro limpo.");
        }

        // Execução Inicial
        drawBoard();
        initEngine();
    </script>
</body>
</html>
