<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Rápido Puter.js</title>
    <!-- 1. Importa a biblioteca oficial do Puter -->
    <script src="https://puter.com"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto;">

    <h2>Pergunte à IA (Sem Chaves / Nuvem)</h2>
    <input type="text" id="pergunta" value="Diga apenas: O Puter no HTML funcionou!" style="width: 80%; padding: 10px;">
    <button onclick="chamarIA()" style="padding: 10px 20px; cursor: pointer;">Enviar</button>

    <div style="margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 5px;">
        <strong>Resposta:</strong>
        <p id="resultado">Clique no botão para testar...</p>
    </div>

    <script>
        async function chamarIA() {
            const campoTexto = document.getElementById('pergunta').value;
            const elementoResultado = document.getElementById('resultado');
            
            elementoResultado.innerText = "A processar na nuvem...";

            try {
                // 2. Chamada direta à API global e pública do Puter
                const resposta = await puter.ai.chat(campoTexto);
                elementoResultado.innerText = resposta;
            } catch (erro) {
                elementoResultado.innerText = "Erro: " + JSON.stringify(erro);
                console.error(erro);
            }
        }
    </script>

</body>
</html>
