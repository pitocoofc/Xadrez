<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Painel de Personalização</title>

<style>
    :root {
        --bg: #0a0a0c;
        --surface: #141417;
        --border: #242428;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --text: #f3f4f6;
        --text-muted: #a1a1aa;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        overflow: hidden;
    }

    /* LAYOUT EM DUAS COLUNAS */
    .container {
        display: flex;
        width: 100%;
        height: 100%;
    }

    /* PAINEL DE CONFIGURAÇÕES (ESQUERDA) */
    .settings-panel {
        width: 400px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 25px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .subtitle {
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 15px;
    }

    .section {
        background: rgba(255, 255, 255, 0.02);
        padding: 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        transition: border-color 0.2s;
    }

    .section:focus-within {
        border-color: var(--accent);
    }

    label {
        display: block;
        margin-bottom: 10px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* INPUTS AJUSTADOS */
    input[type="text"], select {
        width: 100%;
        padding: 12px;
        background: #0f0f11;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: white;
        outline: none;
        font-size: 14px;
        transition: 0.2s;
    }

    input[type="text"]:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .color-picker-wrapper {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    input[type="color"] {
        -webkit-appearance: none;
        border: none;
        width: 55px;
        height: 40px;
        border-radius: 6px;
        cursor: pointer;
        background: none;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 6px; }

    .btn-group {
        display: flex;
        gap: 10px;
    }

    button {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0f0f11;
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
    }

    button:hover {
        background: var(--border);
    }

    button.primary {
        background: var(--accent);
        border-color: var(--accent);
    }

    button.primary:hover {
        background: var(--accent-hover);
    }

    button:active {
        transform: scale(0.98);
    }

    /* ÁREA DO PREVIEW (DIREITA) */
    .preview-container {
        flex: 1;
        background: var(--bg);
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .preview-header {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .preview-header::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #10b981; /* Verde ativo */
        border-radius: 50%;
    }

    .iframe-wrapper {
        flex: 1;
        border-radius: 16px;
        border: 1px solid var(--border);
        overflow: hidden;
        background: #000;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* RESPONSIVO PARA TELAS MENORES */
    @media(max-width: 850px) {
        body { overflow-y: auto; height: auto; }
        .container { flex-direction: column; height: auto; }
        .settings-panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        .preview-container { height: 500px; }
    }
</style>
</head>
<body>

<div class="container">
    
    <div class="settings-panel">
        <div>
            <h1>🎨 Customizer</h1>
            <div class="subtitle">Modifique o comportamento e visual do GhostClock</div>
        </div>

        <div class="section">
            <label>Cor do Elemento</label>
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" oninput="applyColor()">
                <span style="font-size: 14px; color: var(--text-muted);">Escolha uma cor para o realce</span>
            </div>
        </div>

        <div class="section">
            <label>Fonte do Relógio</label>
            <select id="fontSelect" onchange="applyFont()">
                <option value="'Segoe UI', sans-serif">Padrão</option>
                <option value="'Arial', sans-serif">Arial</option>
                <option value="'Courier New', monospace">Courier</option>
                <option value="'Orbitron', monospace">Digital (Orbitron)</option>
                <option value="fantasy">Fantasy</option>
            </select>
        </div>

        <div class="section">
            <label>Visibilidade do Relógio</label>
            <div class="btn-group">
                <button onclick="toggleClock(true)">Mostrar</button>
                <button onclick="toggleClock(false)">Ocultar</button>
            </div>
        </div>

        <div class="section">
            <label>Wallpaper (URL da imagem)</label>
            <input type="text" id="wallInput" placeholder="https://exemplo.com/imagem.jpg" style="margin-bottom: 12px;">
            <button class="primary" onclick="applyWallpaper()">Definir Plano de Fundo</button>
        </div>
    </div>

    <div class="preview-container">
        <div class="preview-header">Visualização em Tempo Real</div>
        <div class="iframe-wrapper">
            <iframe id="livePreview" src="index.html"></iframe>
        </div>
    </div>

</div>

<script>
// Envia os dados para o sistema operacional pai E também para o iframe local
function send(data){
    // Envia para o iframe pai se este customizer rodar dentro de outra janela
    window.parent.postMessage(data, '*');
    
    // Envia direto pro nosso preview em tempo real
    const previewFrame = document.getElementById('livePreview');
    if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage(data, '*');
    }
}

function applyColor(){
    const color = document.getElementById('colorPicker').value;
    localStorage.setItem('clock_color', color);
    send({ type: 'clock_color', value: color });
}

function applyFont(){
    const font = document.getElementById('fontSelect').value;
    localStorage.setItem('clock_font', font);
    send({ type: 'clock_font', value: font });
}

function toggleClock(state){
    send({ type: 'clock_toggle', value: state });
}

function applyWallpaper(){
    const url = document.getElementById('wallInput').value;
    localStorage.setItem('clock_wallpaper', url);
    send({ type: 'SET_WALLPAPER', url: url });
}

// Carrega os dados salvos ao iniciar a página
window.onload = () => {
    const savedColor = localStorage.getItem('clock_color');
    if(savedColor){
        document.getElementById('colorPicker').value = savedColor;
    }

    const savedFont = localStorage.getItem('clock_font');
    if(savedFont){
        document.getElementById('fontSelect').value = savedFont;
    }
    
    const savedWall = localStorage.getItem('clock_wallpaper');
    if(savedWall){
        document.getElementById('wallInput').value = savedWall;
    }
}
</script>

</body>
              </html>
